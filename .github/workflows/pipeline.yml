# Pipeline CI/CD para SvelteKit + Cloudflare Pages
#
# Secretos requeridos en GitHub Repository Settings > Secrets:
#   - CLOUDFLARE_ACCOUNT_ID: ID de la cuenta de Cloudflare
#   - CLOUDFLARE_API_TOKEN: Token API con permisos de Cloudflare Pages Edit

name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas con cobertura
        run: npm run test:coverage

      - name: Compilar proyecto
        run: npm run build

      - name: Subir artefacto de build
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-build
          path: .svelte-kit/cloudflare
          retention-days: 1

  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Descargar artefacto de build
        uses: actions/download-artifact@v4
        with:
          name: cloudflare-build
          path: ./deploy-output

      - name: Desplegar a Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./deploy-output --project-name=practice--pipeline
